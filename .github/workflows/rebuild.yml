name: Daily rebuild

# Re-triggers the Cloudflare Pages production build so the data pages
# (/listening, /movies, /places, /activities) pick up fresh data from the
# Rewind API (build-time fetch).
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        env:
          PAGES_DEPLOY_HOOK: ${{ secrets.PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$PAGES_DEPLOY_HOOK" ]; then
            echo "PAGES_DEPLOY_HOOK secret is not set" >&2
            exit 1
          fi
          curl -fsS -X POST "$PAGES_DEPLOY_HOOK"
